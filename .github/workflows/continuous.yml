name: continuous

# Rolling prerelease for every code-change push to main. Docs-only commits
# (**.md, .gitignore, .env.example, LICENSE*) do NOT trigger — the paths
# filter below gates on source/build files.
#
# For stable versioned releases see release.yml (triggered by v* tags).
on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - '**.c'
      - '**.h'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/continuous.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: continuous-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: [self-hosted, macOS, ARM64]
            arch: arm64
          - runner: macos-13
            arch: amd64
    runs-on: ${{ matrix.runner }}
    # Intel builds use the free-tier hosted Intel runner which can queue for
    # a long time. Don't block the release on it — arm64 is the primary target.
    continue-on-error: ${{ matrix.arch == 'amd64' }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify native arch
        run: |
          ACTUAL=$(uname -m)
          case "$ACTUAL" in
            arm64)  EXPECT=arm64 ;;
            x86_64) EXPECT=amd64 ;;
            *)      echo "unknown arch $ACTUAL"; exit 1 ;;
          esac
          if [ "$EXPECT" != "${{ matrix.arch }}" ]; then
            echo "runner arch ($EXPECT) != matrix arch (${{ matrix.arch }})"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o beehiiv-mcp .

      - name: Ad-hoc codesign
        run: codesign --sign - --force --options runtime beehiiv-mcp

      - name: Package
        id: package
        run: |
          VERSION="main-${GITHUB_SHA:0:7}"
          STEM="beehiiv-mcp_${VERSION}_darwin_${{ matrix.arch }}"
          mkdir -p "$STEM"
          cp beehiiv-mcp README.md "$STEM/"
          tar czf "${STEM}.tar.gz" "$STEM"
          shasum -a 256 "${STEM}.tar.gz" > "${STEM}.tar.gz.sha256"
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.stem }}
          path: |
            ${{ steps.package.outputs.stem }}.tar.gz
            ${{ steps.package.outputs.stem }}.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Delete previous continuous release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # Replace the rolling release so `continuous` always points at the
          # newest main build. No-op on the first run.
          gh release delete continuous --cleanup-tag --yes 2>/dev/null || true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: continuous (${{ github.sha }})
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          body: |
            Rolling build from `main` at commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

            This release is replaced on every code-change push to `main`. For stable versioned builds, see the [tagged releases](https://github.com/${{ github.repository }}/releases?q=is%3Arelease+tag%3Av).
