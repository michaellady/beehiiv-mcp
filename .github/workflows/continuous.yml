name: continuous

# Rolling prerelease for every code-change push to main. Docs-only commits
# (**.md, .gitignore, .env.example, LICENSE*) do NOT trigger — the paths
# filter below gates on source/build files.
#
# For stable versioned releases see release.yml (triggered by v* tags).
on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - '**.c'
      - '**.h'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/continuous.yml'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: continuous-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_arm64:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify native arch
        run: test "$(uname -m)" = arm64
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o beehiiv-mcp .
      - name: Ad-hoc codesign
        run: codesign --sign - --force --options runtime beehiiv-mcp
      - name: Package
        id: package
        run: |
          VERSION="main-${GITHUB_SHA:0:7}"
          STEM="beehiiv-mcp_${VERSION}_darwin_arm64"
          mkdir -p "$STEM"
          cp beehiiv-mcp README.md "$STEM/"
          tar czf "${STEM}.tar.gz" "$STEM"
          shasum -a 256 "${STEM}.tar.gz" > "${STEM}.tar.gz.sha256"
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.stem }}
          path: |
            ${{ steps.package.outputs.stem }}.tar.gz
            ${{ steps.package.outputs.stem }}.tar.gz.sha256
          if-no-files-found: error

  build_amd64:
    # Free-tier Intel runner — queues slowly. Runs in parallel with arm64
    # but the release job does NOT wait on it (see `release.needs` below).
    # If it eventually succeeds, a follow-up release-amend job attaches the
    # Intel tarball to the already-published release.
    runs-on: macos-13
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify native arch
        run: test "$(uname -m)" = x86_64
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o beehiiv-mcp .
      - name: Ad-hoc codesign
        run: codesign --sign - --force --options runtime beehiiv-mcp
      - name: Package
        id: package
        run: |
          VERSION="main-${GITHUB_SHA:0:7}"
          STEM="beehiiv-mcp_${VERSION}_darwin_amd64"
          mkdir -p "$STEM"
          cp beehiiv-mcp README.md "$STEM/"
          tar czf "${STEM}.tar.gz" "$STEM"
          shasum -a 256 "${STEM}.tar.gz" > "${STEM}.tar.gz.sha256"
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.stem }}
          path: |
            ${{ steps.package.outputs.stem }}.tar.gz
            ${{ steps.package.outputs.stem }}.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: build_arm64
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: beehiiv-mcp_*_darwin_arm64
      - name: List artifacts
        run: ls -la dist
      - name: Delete previous continuous release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release delete continuous --cleanup-tag --yes 2>/dev/null || true
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: continuous (${{ github.sha }})
          prerelease: true
          make_latest: false
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          fail_on_unmatched_files: true
          body: |
            Rolling build from `main` at commit [`${{ github.sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

            Published as soon as the arm64 build completes. An amd64 (Intel Mac) asset may be attached later if the free-tier Intel runner becomes available.

            For stable versioned builds, see the [tagged releases](https://github.com/${{ github.repository }}/releases?q=is%3Arelease+tag%3Av).

  attach_amd64:
    # Runs after amd64 builds finish (which may be much later than release).
    # Attaches the Intel tarball to the existing continuous release without
    # disturbing what's already there.
    needs: [release, build_amd64]
    if: needs.build_amd64.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: beehiiv-mcp_*_darwin_amd64
      - name: Attach amd64 assets to continuous release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for f in dist/*; do
            gh release upload continuous "$f" --clobber
          done
