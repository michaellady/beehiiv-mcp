name: release

# Triggered by pushing a v* tag. Produces an official semver release.
# For main-branch rolling builds see continuous.yml.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build_arm64:
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify native arch
        run: test "$(uname -m)" = arm64
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o beehiiv-mcp .
      - name: Ad-hoc codesign
        run: codesign --sign - --force --options runtime beehiiv-mcp
      - name: Package
        id: package
        run: |
          STEM="beehiiv-mcp_${GITHUB_REF_NAME}_darwin_arm64"
          mkdir -p "$STEM"
          cp beehiiv-mcp README.md "$STEM/"
          tar czf "${STEM}.tar.gz" "$STEM"
          shasum -a 256 "${STEM}.tar.gz" > "${STEM}.tar.gz.sha256"
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.stem }}
          path: |
            ${{ steps.package.outputs.stem }}.tar.gz
            ${{ steps.package.outputs.stem }}.tar.gz.sha256
          if-no-files-found: error

  build_amd64:
    runs-on: macos-13
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify native arch
        run: test "$(uname -m)" = x86_64
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o beehiiv-mcp .
      - name: Ad-hoc codesign
        run: codesign --sign - --force --options runtime beehiiv-mcp
      - name: Package
        id: package
        run: |
          STEM="beehiiv-mcp_${GITHUB_REF_NAME}_darwin_amd64"
          mkdir -p "$STEM"
          cp beehiiv-mcp README.md "$STEM/"
          tar czf "${STEM}.tar.gz" "$STEM"
          shasum -a 256 "${STEM}.tar.gz" > "${STEM}.tar.gz.sha256"
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.stem }}
          path: |
            ${{ steps.package.outputs.stem }}.tar.gz
            ${{ steps.package.outputs.stem }}.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: build_arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: beehiiv-mcp_*_darwin_arm64
      - name: List artifacts
        run: ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true

  attach_amd64:
    needs: [release, build_amd64]
    if: needs.build_amd64.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: beehiiv-mcp_*_darwin_amd64
      - name: Attach amd64 assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for f in dist/*; do
            gh release upload "${GITHUB_REF_NAME}" "$f" --clobber
          done
