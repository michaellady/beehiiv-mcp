name: release

# Every code-change push to main produces a new patch release (v0.0.1, v0.0.2,
# v0.0.3, …). Docs-only commits don't trigger. For a custom version bump
# (minor/major), run the workflow manually via Actions → release → Run workflow
# and pass a `version` like v0.1.0 or v1.0.0.
on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - '**.c'
      - '**.h'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - '.github/workflows/release.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (e.g. v0.2.0 or v1.0.0). Blank = auto-bump patch from the latest existing tag.'
        required: false

permissions:
  contents: write

# Serialize releases on the same ref so two fast-follow pushes can't race to
# compute the same next version.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compute_version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.value }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: v
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -e
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            echo "Using manual override: $VERSION"
          else
            # Pick the highest existing vX.Y.Z tag; start at v0.0.0 if none.
            LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n1)
            if [ -z "$LATEST" ]; then
              VERSION="v0.0.1"
            else
              IFS='.' read -r MAJOR MINOR PATCH <<<"${LATEST#v}"
              VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
            fi
            echo "Auto-bumping from '${LATEST:-<none>}' → $VERSION"
          fi

          # Sanity: fail if the computed tag already exists. Shouldn't happen
          # with concurrency serializing, but defensive.
          if git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "tag $VERSION already exists" >&2
            exit 1
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

  build_arm64:
    needs: compute_version
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify native arch
        run: test "$(uname -m)" = arm64
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o beehiiv-mcp .
      - name: Ad-hoc codesign
        run: codesign --sign - --force --options runtime beehiiv-mcp
      - name: Package
        id: package
        run: |
          STEM="beehiiv-mcp_${{ needs.compute_version.outputs.version }}_darwin_arm64"
          mkdir -p "$STEM"
          cp beehiiv-mcp README.md "$STEM/"
          tar czf "${STEM}.tar.gz" "$STEM"
          shasum -a 256 "${STEM}.tar.gz" > "${STEM}.tar.gz.sha256"
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.stem }}
          path: |
            ${{ steps.package.outputs.stem }}.tar.gz
            ${{ steps.package.outputs.stem }}.tar.gz.sha256
          if-no-files-found: error

  build_amd64:
    # Free-tier Intel runner. Doesn't block the release — the Intel asset is
    # attached after the fact if this job succeeds.
    needs: compute_version
    runs-on: macos-13
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify native arch
        run: test "$(uname -m)" = x86_64
      - name: Test
        run: go test ./...
      - name: Build
        run: go build -trimpath -ldflags "-s -w" -o beehiiv-mcp .
      - name: Ad-hoc codesign
        run: codesign --sign - --force --options runtime beehiiv-mcp
      - name: Package
        id: package
        run: |
          STEM="beehiiv-mcp_${{ needs.compute_version.outputs.version }}_darwin_amd64"
          mkdir -p "$STEM"
          cp beehiiv-mcp README.md "$STEM/"
          tar czf "${STEM}.tar.gz" "$STEM"
          shasum -a 256 "${STEM}.tar.gz" > "${STEM}.tar.gz.sha256"
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.stem }}
          path: |
            ${{ steps.package.outputs.stem }}.tar.gz
            ${{ steps.package.outputs.stem }}.tar.gz.sha256
          if-no-files-found: error

  release:
    needs: [compute_version, build_arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: beehiiv-mcp_*_darwin_arm64
      - name: List artifacts
        run: ls -la dist
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.compute_version.outputs.version }}
          name: ${{ needs.compute_version.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true

  attach_amd64:
    needs: [compute_version, release, build_amd64]
    if: needs.build_amd64.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: beehiiv-mcp_*_darwin_amd64
      - name: Attach amd64 assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          for f in dist/*; do
            gh release upload "${{ needs.compute_version.outputs.version }}" "$f" --clobber
          done
